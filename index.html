<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard - Nagybetűs</title>
    <style>
        /* ---------- ALAPOK ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0b0e14;
            color: #f0f4f8;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            user-select: none;
            touch-action: none;
        }

        .dashboard {
            width: 100vw;
            height: 100vh;
            max-width: 1440px;
            max-height: 720px;
            position: relative;
            background: radial-gradient(circle at 70% 30%, #1a1f2b, #0b0e14);
            overflow: hidden;
        }

        /* ---------- KÉPERNYŐK ---------- */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px 30px;
            text-align: center;
        }

        .screen.active {
            display: flex;
        }

        /* ---------- 1. KÉPERNYŐ: IDŐ + IDŐJÁRÁS (NAGY) ---------- */
        .screen-1 .time {
            font-size: 6.5rem;      /* hatalmas óra */
            font-weight: 700;
            letter-spacing: 4px;
            color: #ffffff;
            text-shadow: 0 0 40px rgba(100, 180, 255, 0.2);
        }
        .screen-1 .date {
            font-size: 2.4rem;
            font-weight: 400;
            color: #a0b8d0;
            margin-top: 6px;
        }
        .screen-1 .weather-row {
            display: flex;
            align-items: center;
            gap: 30px;
            margin-top: 15px;
        }
        .screen-1 .weather-icon {
            font-size: 5.0rem;
        }
        .screen-1 .weather-temp {
            font-size: 4.8rem;
            font-weight: 600;
            color: #b4e0ff;
        }
        .screen-1 .weather-desc {
            font-size: 2.4rem;
            font-weight: 300;
            color: #c8dae8;
        }
        .screen-1 .weather-extra {
            font-size: 1.6rem;
            color: #7a94b0;
            margin-top: 6px;
        }

        /* ---------- 2. KÉPERNYŐ: R6 STATISZTIKÁK (VÍZSZINTES, NAGY) ---------- */
        .screen-2 .r6-title {
            font-size: 1.8rem;
            font-weight: 300;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #7a94b0;
        }
        .screen-2 .r6-name {
            font-size: 3.6rem;
            font-weight: 700;
            color: #ffb347;
            margin-top: 2px;
        }
        .screen-2 .r6-rank {
            font-size: 3.0rem;
            font-weight: 600;
            color: #ffd966;
            margin-top: 2px;
        }
        .screen-2 .r6-stats-row {
            display: flex;
            flex-direction: row;
            justify-content: center;
            gap: 50px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        .screen-2 .r6-stat-item {
            text-align: center;
        }
        .screen-2 .r6-stat-value {
            font-size: 4.0rem;      /* hatalmas számok */
            font-weight: 700;
            color: #ffffff;
            line-height: 1.2;
        }
        .screen-2 .r6-stat-label {
            font-size: 1.4rem;
            font-weight: 300;
            color: #7a94b0;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 2px;
        }
        .screen-2 .r6-error {
            color: #e07c7c;
            font-size: 1.8rem;
            margin-top: 15px;
        }

        /* ---------- 3. KÉPERNYŐ: KRIPTO (NAGY) ---------- */
        .screen-3 .crypto-title {
            font-size: 1.8rem;
            font-weight: 300;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #7a94b0;
            margin-bottom: 10px;
        }
        .screen-3 .crypto-list {
            display: flex;
            flex-direction: row;
            gap: 60px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .screen-3 .crypto-item {
            text-align: center;
        }
        .screen-3 .crypto-symbol {
            font-size: 2.4rem;
            font-weight: 600;
            color: #a0b8d0;
            letter-spacing: 2px;
        }
        .screen-3 .crypto-price {
            font-size: 3.6rem;
            font-weight: 700;
            color: #ffd966;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.1);
        }
        .screen-3 .crypto-currency {
            font-size: 1.6rem;
            font-weight: 300;
            color: #7a94b0;
            margin-left: 4px;
        }

        /* ---------- INDIKÁTOR ---------- */
        .indicator {
            position: absolute;
            top: 15px;
            right: 25px;
            font-size: 1.0rem;
            color: #3e4f62;
            letter-spacing: 2px;
            background: rgba(0,0,0,0.4);
            padding: 6px 16px;
            border-radius: 30px;
            backdrop-filter: blur(4px);
            pointer-events: none;
        }

        /* ---------- KISEBB KÉPERNYŐKRE ---------- */
        @media (max-width: 800px) {
            .screen-1 .time { font-size: 4.5rem; }
            .screen-1 .date { font-size: 1.8rem; }
            .screen-1 .weather-temp { font-size: 3.6rem; }
            .screen-1 .weather-desc { font-size: 1.8rem; }
            .screen-2 .r6-name { font-size: 2.6rem; }
            .screen-2 .r6-rank { font-size: 2.2rem; }
            .screen-2 .r6-stat-value { font-size: 2.8rem; }
            .screen-2 .r6-stats-row { gap: 25px; }
            .screen-3 .crypto-price { font-size: 2.6rem; }
            .screen-3 .crypto-list { gap: 30px; }
        }
    </style>
</head>
<body>

<div class="dashboard" id="app">

    <!-- ---------- 1. KÉPERNYŐ ---------- -->
    <div class="screen screen-1 active" id="screen1">
        <div class="time" id="clock">--:--:--</div>
        <div class="date" id="date">----. --. --.</div>
        <div class="weather-row">
            <div class="weather-icon" id="weatherIcon">⏳</div>
            <div>
                <div class="weather-temp" id="weatherTemp">-- °C</div>
                <div class="weather-desc" id="weatherDesc">Betöltés...</div>
            </div>
        </div>
        <div class="weather-extra" id="weatherExtra">Szél: -- km/h</div>
    </div>

    <!-- ---------- 2. KÉPERNYŐ: R6 (vízszintes) ---------- -->
    <div class="screen screen-2" id="screen2">
        <div class="r6-title">🎯 Rainbow Six Siege</div>
        <div class="r6-name" id="r6Name">pstar5</div>
        <div class="r6-rank" id="r6Rank">⏳ Rang betöltése...</div>
        <div class="r6-stats-row" id="r6StatsRow">
            <div class="r6-stat-item">
                <div class="r6-stat-value" id="r6Mmr">--</div>
                <div class="r6-stat-label">MMR</div>
            </div>
            <div class="r6-stat-item">
                <div class="r6-stat-value" id="r6Kd">--</div>
                <div class="r6-stat-label">K/D</div>
            </div>
            <div class="r6-stat-item">
                <div class="r6-stat-value" id="r6Wr">--%</div>
                <div class="r6-stat-label">Győzelmek</div>
            </div>
            <div class="r6-stat-item">
                <div class="r6-stat-value" id="r6Level">--</div>
                <div class="r6-stat-label">Szint</div>
            </div>
        </div>
        <div class="r6-error" id="r6Error"></div>
    </div>

    <!-- ---------- 3. KÉPERNYŐ: KRIPTO ---------- -->
    <div class="screen screen-3" id="screen3">
        <div class="crypto-title">💰 Kripto árfolyamok (HUF)</div>
        <div class="crypto-list">
            <div class="crypto-item">
                <div class="crypto-symbol">₿ BTC</div>
                <div class="crypto-price"><span id="btcPrice">--</span><span class="crypto-currency">HUF</span></div>
            </div>
            <div class="crypto-item">
                <div class="crypto-symbol">⟠ ETH</div>
                <div class="crypto-price"><span id="ethPrice">--</span><span class="crypto-currency">HUF</span></div>
            </div>
            <div class="crypto-item">
                <div class="crypto-symbol">◎ SOL</div>
                <div class="crypto-price"><span id="solPrice">--</span><span class="crypto-currency">HUF</span></div>
            </div>
        </div>
    </div>

    <!-- INDIKÁTOR -->
    <div class="indicator" id="indicator">1 / 3</div>
</div>

<script>
    (function() {
        "use strict";

        // ----- KONFIG -----
        const ERDOKERTES_LAT = 47.6725;
        const ERDOKERTES_LON = 19.3078;
        const TIMEZONE = 'Europe/Budapest';
        const R6_USERNAME = 'pstar5';
        const FETCH_INTERVAL = 300; // 5 másodperc helyett 5 perc (másodpercben)

        // ----- DOM -----
        const screens = [
            document.getElementById('screen1'),
            document.getElementById('screen2'),
            document.getElementById('screen3')
        ];
        const indicator = document.getElementById('indicator');

        // Screen 1
        const clockEl = document.getElementById('clock');
        const dateEl = document.getElementById('date');
        const weatherIconEl = document.getElementById('weatherIcon');
        const weatherTempEl = document.getElementById('weatherTemp');
        const weatherDescEl = document.getElementById('weatherDesc');
        const weatherExtraEl = document.getElementById('weatherExtra');

        // Screen 2
        const r6NameEl = document.getElementById('r6Name');
        const r6RankEl = document.getElementById('r6Rank');
        const r6MmrEl = document.getElementById('r6Mmr');
        const r6KdEl = document.getElementById('r6Kd');
        const r6WrEl = document.getElementById('r6Wr');
        const r6LevelEl = document.getElementById('r6Level');
        const r6ErrorEl = document.getElementById('r6Error');

        // Screen 3
        const btcPriceEl = document.getElementById('btcPrice');
        const ethPriceEl = document.getElementById('ethPrice');
        const solPriceEl = document.getElementById('solPrice');

        // ----- ÁLLAPOT -----
        let currentScreen = 0;
        let lastFetch = { weather: 0, r6: 0, crypto: 0 };

        // ----- SEGÉDFV: időjárás ikon -----
        function getWeatherTextAndIcon(code) {
            if (code === 0) return { text: 'Tiszta, napos', icon: '☀️' };
            if (code === 1) return { text: 'Derült', icon: '🌤️' };
            if (code === 2) return { text: 'Gyengén felhős', icon: '⛅' };
            if (code === 3) return { text: 'Borult', icon: '☁️' };
            if (code === 45 || code === 48) return { text: 'Ködös', icon: '🌫️' };
            if (code >= 51 && code <= 57) return { text: 'Szitálás', icon: '🌦️' };
            if (code >= 61 && code <= 67) return { text: 'Eszik', icon: '🌧️' };
            if (code >= 71 && code <= 77) return { text: 'Havazik', icon: '❄️' };
            if (code >= 80 && code <= 82) return { text: 'Zápor', icon: '🌧️' };
            if (code >= 85 && code <= 86) return { text: 'Havazás', icon: '🌨️' };
            if (code >= 95 && code <= 99) return { text: 'Zivatar', icon: '⛈️' };
            return { text: 'Ismeretlen', icon: '🌍' };
        }

        // ----- 1. ÓRA -----
        function updateClock() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            clockEl.textContent = `${h}:${m}:${s}`;

            const weekdays = ['Vasárnap', 'Hétfő', 'Kedd', 'Szerda', 'Csütörtök', 'Péntek', 'Szombat'];
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            dateEl.textContent = `${year}. ${month}. ${day}. ${weekdays[now.getDay()]}`;
        }

        // ----- 2. IDŐJÁRÁS (Open-Meteo) -----
        async function fetchWeather(force = false) {
            const now = Math.floor(Date.now() / 1000);
            if (!force && (now - lastFetch.weather) < FETCH_INTERVAL) return;
            try {
                const url = `https://api.open-meteo.com/v1/forecast?latitude=${ERDOKERTES_LAT}&longitude=${ERDOKERTES_LON}&current_weather=true&timezone=${TIMEZONE}`;
                const resp = await fetch(url);
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                const data = await resp.json();
                const current = data.current_weather;
                if (!current) throw new Error('Nincs adat');

                const { text, icon } = getWeatherTextAndIcon(current.weathercode);
                weatherIconEl.textContent = icon;
                weatherTempEl.textContent = `${Math.round(current.temperature)} °C`;
                weatherDescEl.textContent = text;
                weatherExtraEl.textContent = `Szél: ${Math.round(current.windspeed)} km/h`;
                lastFetch.weather = now;
            } catch (err) {
                console.warn('Időjárás hiba:', err);
                if (weatherTempEl.textContent === '-- °C') {
                    weatherIconEl.textContent = '⚠️';
                    weatherTempEl.textContent = '-- °C';
                    weatherDescEl.textContent = 'Nem elérhető';
                    weatherExtraEl.textContent = '';
                }
            }
        }

        // ----- 3. R6 STATISZTIKÁK (CORS proxy-val) -----
        async function fetchR6(force = false) {
            const now = Math.floor(Date.now() / 1000);
            if (!force && (now - lastFetch.r6) < FETCH_INTERVAL) return;
            try {
                r6ErrorEl.textContent = '';
                // Proxy segítségével oldjuk meg a CORS-t
                const target = `https://r6tab.com/api/player.php?p=${encodeURIComponent(R6_USERNAME)}`;
                const proxy = `https://api.allorigins.win/raw?url=${encodeURIComponent(target)}`;
                const resp = await fetch(proxy);
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                const data = await resp.json();

                if (!data.players || data.players.length === 0) {
                    throw new Error('Felhasználó nem található');
                }
                const p = data.players[0];
                r6NameEl.textContent = p.username || R6_USERNAME;
                r6RankEl.textContent = p.rank ? `🏅 ${p.rank}` : 'Rang: N/A';
                r6MmrEl.textContent = p.mmr || '--';
                const kd = p.kd ? parseFloat(p.kd).toFixed(2) : '--';
                r6KdEl.textContent = kd;
                const wins = parseInt(p.wins) || 0;
                const losses = parseInt(p.losses) || 0;
                const total = wins + losses;
                const wr = total > 0 ? Math.round((wins / total) * 100) : 0;
                r6WrEl.textContent = `${wr}%`;
                r6LevelEl.textContent = p.level || '--';
                lastFetch.r6 = now;
            } catch (err) {
                console.warn('R6 hiba:', err);
                r6ErrorEl.textContent = `❌ ${err.message}`;
                r6RankEl.textContent = '⏳ Nem elérhető';
                r6MmrEl.textContent = '--';
                r6KdEl.textContent = '--';
                r6WrEl.textContent = '--%';
                r6LevelEl.textContent = '--';
            }
        }

        // ----- 4. KRIPTO (CoinGecko) -----
        async function fetchCrypto(force = false) {
            const now = Math.floor(Date.now() / 1000);
            if (!force && (now - lastFetch.crypto) < FETCH_INTERVAL) return;
            try {
                const url = 'https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,solana&vs_currencies=huf';
                const resp = await fetch(url);
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                const data = await resp.json();
                if (data.bitcoin) btcPriceEl.textContent = data.bitcoin.huf.toLocaleString('hu-HU', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
                if (data.ethereum) ethPriceEl.textContent = data.ethereum.huf.toLocaleString('hu-HU', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
                if (data.solana) solPriceEl.textContent = data.solana.huf.toLocaleString('hu-HU', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
                lastFetch.crypto = now;
            } catch (err) {
                console.warn('Kripto hiba:', err);
                if (btcPriceEl.textContent === '--') {
                    btcPriceEl.textContent = '--';
                    ethPriceEl.textContent = '--';
                    solPriceEl.textContent = '--';
                }
            }
        }

        // ----- KÉPERNYŐVÁLTÁS -----
        function showScreen(index) {
            screens.forEach((el, i) => el.classList.toggle('active', i === index));
            currentScreen = index;
            indicator.textContent = `${index + 1} / 3`;

            if (index === 0) fetchWeather(false);
            else if (index === 1) fetchR6(false);
            else if (index === 2) fetchCrypto(false);
        }

        // ----- KOPPINTÁS -----
        function handleTap(e) {
            e.preventDefault();
            const next = (currentScreen + 1) % 3;
            showScreen(next);
        }

        // ----- INDÍTÁS -----
        function init() {
            updateClock();
            setInterval(updateClock, 1000);

            fetchWeather(true);
            fetchR6(true);
            fetchCrypto(true);

            setInterval(() => {
                fetchWeather(true);
                fetchR6(true);
                fetchCrypto(true);
            }, FETCH_INTERVAL * 1000);

            document.addEventListener('click', handleTap);
            document.addEventListener('touchend', (e) => {
                // Ne duplán fusson
            });

            document.addEventListener('visibilitychange', () => {
                if (!document.hidden) {
                    if (currentScreen === 0) fetchWeather(true);
                    else if (currentScreen === 1) fetchR6(true);
                    else if (currentScreen === 2) fetchCrypto(true);
                }
            });

            console.log('✅ Nagybetűs, vízszintes R6 dashboard elindult');
        }

        init();
    })();
</script>
</body>
</html>
